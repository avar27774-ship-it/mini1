<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Holographic Interface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: transparent; overflow: hidden; }
        
        .holo-map {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 250px;
            height: 250px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 15px;
            transform: rotateX(10deg) rotateY(-10deg);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: rotateX(10deg) rotateY(-10deg) translateY(0); }
            50% { transform: rotateX(10deg) rotateY(-10deg) translateY(-5px); }
        }
        
        .holo-stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        
        .stat {
            width: 120px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .stat-label {
            font-size: 8px;
            color: rgba(0, 255, 255, 0.7);
            letter-spacing: 1px;
        }
        
        .stat-bar {
            width: 100%;
            height: 3px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 2px;
            margin: 5px 0;
            overflow: hidden;
        }
        
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            width: 100%;
            border-radius: 2px;
        }
        
        .stat-value {
            font-size: 10px;
            color: #00ffff;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="holo-map">
        <canvas id="mapCanvas" width="250" height="250"></canvas>
    </div>
    <div class="holo-stats">
        <div class="stat">
            <div class="stat-label">HEALTH</div>
            <div class="stat-bar"><div class="stat-fill" id="healthFill" style="width: 100%"></div></div>
            <div class="stat-value" id="healthValue">100</div>
        </div>
        <div class="stat">
            <div class="stat-label">ARMOR</div>
            <div class="stat-bar"><div class="stat-fill" id="armorFill" style="width: 100%"></div></div>
            <div class="stat-value" id="armorValue">100</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        
        function drawMap() {
            ctx.clearRect(0, 0, 250, 250);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * 25);
                ctx.lineTo(250, i * 25);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(i * 25, 0);
                ctx.lineTo(i * 25, 250);
                ctx.stroke();
            }
            
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.arc(125, 125, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        setInterval(drawMap, 50);
        
        setInterval(() => {
            const health = Math.floor(Math.random() * 30) + 70;
            const armor = Math.floor(Math.random() * 30) + 70;
            document.getElementById('healthFill').style.width = health + '%';
            document.getElementById('healthValue').textContent = health;
            document.getElementById('armorFill').style.width = armor + '%';
            document.getElementById('armorValue').textContent = armor;
        }, 1000);
    </script>
</body>
</html>
